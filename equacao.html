<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> MATHias </title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📐</text></svg>" />
    <link rel="stylesheet" href="css/paleta.css" />

    <style>
        * {
            box-sizing: border-box;
        }

        .quadro-preto {
            position: relative;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(255, 255, 255, 0.02) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 30%, rgba(255, 255, 255, 0.015) 0%, transparent 50%);
            min-height: 90px;
            border-top: none;
            background: #1b1b1b;
            border-radius: 6px;
            padding: 28px;
            display: flex;
            flex-direction: row;
            box-shadow:
                inset 0 2px 6px rgba(0, 0, 0, 0.6),
                inset 0 -2px 4px rgba(255, 255, 255, 0.05);
        }

        .quadro-preto::before {
            content: "";
            position: absolute;
            inset: 0;
            background: url(textura.jpg) center/cover no-repeat;
            opacity: 0.05;
            mix-blend-mode: screen;
            pointer-events: none;
            z-index: 1;
        }

        .lousa-box {
            position: relative;
            min-width: 0;
            padding: 30px 40px;
            background: rgba(0, 0, 0, 0.08);
            color: #f4f1e8;
            text-align: center;
            z-index: 2;
            min-height: 220px;

            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }


        .lousa-box::before {
            content: "";
            position: absolute;
            inset: -10px;
            border: 3px solid rgba(244, 241, 232, 0.3);
            border-radius: 6px;
            filter: blur(0.3px);
            transform: rotate(-0.5deg);
            box-shadow:
                0 0 2px rgba(255, 255, 255, 0.4),
                0 0 5px rgba(255, 255, 255, 0.15);
            z-index: -1;
        }

        .lousa-box::after {
            content: "";
            position: absolute;
            inset: -8px;
            border: 2px solid rgba(244, 241, 232, 0.45);
            border-radius: 8px;
            transform: rotate(-0.1deg) scale(1.005);
            filter: blur(0.5px);
            z-index: -1;
        }

        .lousa-box h2 {
            margin: 0 0 15px;
            font-size: 2rem;
            letter-spacing: 1px;
            text-shadow: 0 0 1px rgba(255, 255, 255, 0.2);
            font-family: 'Chalker Dust', cursive;
        }

        .lousa-box p {
            margin: 0;
            font-size: 1.5rem;
            text-shadow: 0 0 1px rgba(255, 255, 255, 0.2);
            font-family: 'Gloria Hallelujah', cursive;
        }

        .lousa-box input {
            margin-top: 20px;
            width: 100%;
            padding: 10px 15px;
            border-radius: 6px;
            border: none;
            font-size: 1.2rem;
            font-family: 'Comic Sans', cursive;
            background: rgba(255, 255, 255, 0.1);
            color: #f4f1e8;
            box-shadow:
                inset 0 2px 4px rgba(255, 255, 255, 0.1),
                inset 0 -2px 4px rgba(0, 0, 0, 0.2);
        }

        .primeiro {
            color: var(--giz-azul);
        }

        .segundo {
            color: var(--giz-laranja);
        }

        .terceiro {
            color: var(--giz-verde);
        }

        .quarto {
            color: var(--giz-amarelo);
        }

        .resultado {
            color: var(--giz-rosa);
        }

        main {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 50px;
            padding: 15px;
        }

        .resolver {
            width: 100%;
            padding: 11px 0;
            margin-top: 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-family: 'Caveat', cursive;
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            background: rgba(0, 0, 0, 0.1);
            color: #F4F1E8;
            box-shadow:
                0 4px 14px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }

        .resolver:hover {
            background: rgba(0, 0, 0, 0.2F);
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.5);
        }

        .resolver:active {
            transform: translateY(1px);
            transition: 0.05s;
        }

        .resolver::before {
            content: '✎';
            transition: transform 0.3s ease;
            display: inline-block;
            margin-right: 8px;
        }

        .resolver:hover::before {
            transform: scale(1.1) rotate(15deg);
        }
    </style>

</head>

<body>
    <div class="quadro">
        <div class="quadro-dentro">
            <h1>📐 MATHias </h1>
            <h2> Calculadora Avançada.</h2>
            <div class="risco"></div>
        </div>
    </div>

    <table class="aba">
        <tr>
            <td data-emoji="🔢" id="inicial"> Básica </td>
            <td data-emoji="📊" id="avancada"> Avançada</td>
            <td data-emoji="✏️" id="equacao"> Equações E Texto</td>
            <td data-emoji="📈" id="graficos"> Gráficos</td>
            <td data-emoji="🤖" id="IA"> MATH'IAs </td>
        </tr>
    </table>

    <div class="quadro">
        <div class="quadro-preto">
            <main>
                <div class="lousa-box">

                    <h2>Primeiro grau</h2>
                    <p class="primeiro" id = "res1"> ax + b = <span class="resultado">0</span> </p>
                    <input type="number" placeholder="Informe A" id="a1">
                    <input type="number" placeholder="Informe B" id="b1">
                    <input type="number" placeholder="Informe o resultado" id="x1">
                    <button class="resolver" id="resolver-equacao" onclick="primeiroGrau()">Resolver</button>
                </div>

                <div class="lousa-box">
                    <h2>Segundo grau</h2>
                    <p class="segundo" id="res2"> ax² + bx + c = <span class="resultado" id="res2">0</span> </p>
                    <input type="number" placeholder="Informe A" id="a2">
                    <input type="number" placeholder="Informe B" id="b2">
                    <input type="number" placeholder="Informe C" id="c2">
                    <button class="resolver" onclick="segundoGrau()">Resolver</button>
                </div>

                <div class="lousa-box">
                    <h2>Exponencial</h2>
                    <p class="terceiro" id="res3"> a<sup>x</sup> = <span class="resultado" id="res3">b</span> </p>
                    <input type="number" placeholder="Informe A" id="a3">
                    <input type="number" placeholder="Informe B" id="b3">
                    <button class="resolver"onclick="exponencial()">Resolver</button>
                </div>

                <div class="lousa-box">
                    <h2>Logarítmica</h2>
                    <p class="quarto" id="res4"> log<sub>a</sub>(x) = <span class="resultado" id="res4">b</span> </p>
                    <input type="number" placeholder="Informe A" id="a4">
                    <input type="text" placeholder="Informe X" id="x4">
                    <input type="number" placeholder="Informe B" id="b4">
                    <button class="resolver" onclick="expressaoLog()">Resolver</button>
                </div>
            </main>
        </div>
    </div>



    <script src="js/calculo.js"></script>
</body>
