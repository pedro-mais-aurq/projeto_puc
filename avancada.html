<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> MATHeus </title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📐</text></svg>" />
    <link rel="stylesheet" href="css/paleta.css" />

    <style>
        body {
            background-color: var(--madeira-dark);
            flex-direction: column;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.03), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 0, 0, 0.2), transparent 50%);

            background-blend-mode: overlay;
        }

        .mesa {
            width: 53%;
            min-height: 500px;
            border-radius: 18px;
            padding: 35px;

            background:
                linear-gradient(135deg, #6e4528, #8a5b34, #5a381d);

            box-shadow:
                inset 0 3px 8px rgba(255, 255, 255, 0.06),
                inset 0 -10px 20px rgba(0, 0, 0, 0.2),
                0 18px 40px rgba(0, 0, 0, 0.35);

            position: relative;
            overflow: hidden;
        }

        .mesa::before {
            content: '';
            position: absolute;
            inset: 0;

            background:
                repeating-linear-gradient(90deg,
                    rgba(255, 255, 255, 0.03) 0px,
                    rgba(255, 255, 255, 0.03) 2px,
                    transparent 2px,
                    transparent 60px),
                repeating-linear-gradient(0deg,
                    rgba(0, 0, 0, 0.03) 0px,
                    rgba(0, 0, 0, 0.03) 1px,
                    transparent 1px,
                    transparent 45px);

            opacity: 0.35;
            pointer-events: none;
        }

        .itens-mesa {
            position: relative;
            display: flex;
            gap: 24px;
            align-items: flex-start;
            flex-wrap: wrap;
            z-index: 1;
        }

        .caderno {
            width: 220px;
            height: 300px;
            border-radius: 10px;
            position: relative;

            box-shadow:
                0 12px 20px rgba(0, 0, 0, 0.25),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05);

            transform: rotate(-2deg);
        }

        .folha-aberta {
            background: #f4ecd8;
            width: 220px;
            height: 300px;
            border-radius: 10px;
            padding: 30px 28px 24px 42px;

            box-shadow:
                0 15px 28px rgba(0, 0, 0, 0.22),
                inset 0 0 0 1px rgba(0, 0, 0, 0.05);

            position: relative;
            transform: rotate(-2deg);
        }

        .folha-aberta::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 10px;

            background:
                repeating-linear-gradient(to bottom,
                    transparent,
                    transparent 28px,
                    rgba(80, 120, 255, 0.15) 29px);

            pointer-events: none;
        }

        .folha-aberta::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 28px;
            width: 2px;
            background: rgba(200, 60, 60, 0.35);
        }

        .folha-aberta h3 {
            font-family: 'Special Elite', cursive;
            color: #2a2a2a;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .folha-aberta p {
            font-family: 'Caveat', cursive;
            font-size: 24px;
            color: #2f2f2f;
            margin-bottom: 14px;
            position: relative;
            z-index: 1;
        }

        .etiqueta {
            position: absolute;
            top: 07px;
            left: 15px;

            background: rgba(255, 255, 255, 0.85);
            color: var(--grafite);

            padding: 8px 14px;
            border-radius: 6px;

            font-family: 'Special Elite', cursive;
            font-size: 16px;

            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        button:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        .quadro {
            position: relative;
            width: 1000px;
            padding: 16px;
            border-radius: 10px;

            background: linear-gradient(145deg,
                    #5a3e2b,
                    #3e2a1d);

            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.6),
                inset 0 2px 4px rgba(255, 255, 255, 0.15),
                inset 0 -4px 8px rgba(0, 0, 0, 0.4);
        }

        .separar {
            display: flex;
            gap: 35px;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        h1 {
            font-family: 'Special Elite', cursive;
            color: var(--giz);
            font-size: 32px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
            margin: 0;
            letter-spacing: 0.08em;
            text-align: left;
        }



        h2 {
            font-family: 'Caveat', cursive;
            color: var(--giz-escuro);
            font-size: 18px;
            margin-top: 4px;
            text-align: left;
            letter-spacing: 0.05em
        }

        .risco {
            height: 3px;
            background: linear-gradient(90deg, var(--giz-escuro), transparent);
            border-radius: 2px;
            margin-top: 14px;
            opacity: 0.4;
        }

        p {
            font-family: 'Caveat', cursive;
            color: var(--giz);
            font-size: 25px;
            margin-bottom: 4px;
            padding-bottom: 6px;
        }

        .riscado {
            color: var(--giz);
            border-bottom: 2px dashed rgba(255, 255, 255, 0.2);
            font-size: 22px;
            padding-bottom: 6px;
            margin-bottom: 4px;
        }

        .aba {
            border-collapse: separate;
            border-spacing: 10px;
            display: flex;
            gap: 6px;
            padding: 1px;
            flex-wrap: wrap;
            margin-bottom: 20px;

        }

        .aba td {
            background-color: var(--quadro);
            border: 2px solid var(--madeira);
            color: var(--giz);
            padding: 10px 16px;
            border-radius: 6px;
            font-family: 'Special Elite', cursive;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.1s;

        }

        .quadro+.quadro {
            margin-top: 30px;
        }

        .quadro-dentro {
            position: relative;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(255, 255, 255, 0.02) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 30%, rgba(255, 255, 255, 0.015) 0%, transparent 50%);
            min-height: 90px;
            border-top: none;
            background: #1c2b22;
            border-radius: 6px;
            padding: 28px;

            box-shadow:
                inset 0 2px 6px rgba(0, 0, 0, 0.6),
                inset 0 -2px 4px rgba(255, 255, 255, 0.05);

        }

        .quadro-dentro::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(180deg,
                    transparent,
                    transparent 28px,
                    rgba(255, 255, 255, 0.025) 28px,
                    rgba(255, 255, 255, 0.025) 29px);
            pointer-events: none;
            border-radius: 3px;
        }

        input[type="number"] {
            border: none;
            background-color: #f4ecd8;
            border-radius: 2px;
            font-family: 'Caveat', cursive;
            color: var(--grafite-escuro);
            font-size: 20px;

        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }


        .linha-resultado {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            padding-bottom: 6px;
            border-bottom: 1px dashed rgba(0, 0, 0, 0.15);
            position: relative;
            z-index: 1;
        }

        .linha-resultado h3 {
            margin: 0;
            font-size: 22px;
            font-family: 'Caveat', cursive;
            color: var(--grafite);
        }

        .linha-resultado span {
            font-size: 18px;
            font-family: 'Special Elite', cursive;
            color: var(--grafite-escuro);
        }

        button {
            height: 50px;
            width: 50%;
            border: none;
            border-radius: 8px;
            font-family: 'Special Elite', cursive;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.1s;
            color: var(--grafite);
        }

        .caderno+.caderno {
            margin: 30px;
        }
    </style>
</head>

<body>

    <div class="quadro">
        <div class="quadro-dentro">
            <h1>📐 MATHeus </h1>
            <h2> Calculadora Avançada.</h2>
            <div class="risco"></div>
        </div>
    </div>

    <table class="aba">
        <tr>
            <td id="inicial"> 🔢 Básica </td>
            <td id="avancada"> 📊 Avançada</td>
            <td id="log"> 🧮 Logaritmo</td>
            <td id="equacao"> ✏️ Equações E Texto</td>
            <td id="IA"> 🤖 MATHeus' IA </td>
        </tr>
    </table>
    <div class="mesa">
        <div class="itens-mesa">
            <div class="caderno">
                <div class="folha-aberta">

                    <div class="linha-resultado">
                        <h3>Seno:</h3>
                        <span class="trig" id="seno"></span>

                    </div>
                    <div class="linha-resultado">
                        <h3>Cosseno:</h3>
                        <span id="cosseno"></span>
                    </div>
                    <div class="linha-resultado">
                        <h3>Tangente:</h3>
                        <span id="tangente"></span>
                    </div>


                    <input type="number" id="entrada" placeholder="Informe o valor do grau a ser calculado.">
                    <button onclick="calcularTrig()">Calcular</button>
                    <div class="etiqueta">
                        Trigonometria
                    </div>
                </div>
            </div>

            <div class="caderno">
                <div class="folha-aberta">
                    <div class = "etiqueta">
                        Raiz e potência.
                </div>

                <div class = "linha-resultado">
                    <h3> Raiz:</h3>
                    <span class="pot" id = "raiz"></span>
                </div>
                    <div class = "linha-resultado">
                        <h3>Potência:</h3>
                        <span class="pot" id = "potencia"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="js/calculo.js"></script>
</body>

</html>
