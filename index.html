<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> MATHeus </title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📐</text></svg>" />
    <link rel="stylesheet" href="css/paleta.css" />

    <style>
        body {
            background-color: var(--madeira-dark);
            flex-direction: column;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.03), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 0, 0, 0.2), transparent 50%);

            background-blend-mode: overlay;
        }


        .calculadora {
            background-color: var(--quadro-dark);
            border: 2px solid var(--madeira);
            border-radius: 12px;
            padding: 20px;
            width: 320px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            margin-left: 11px;
        }

        .display {
            background-color: rgba(17, 36, 28, 0.7);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: right;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #expressao {
            color: var(--giz-escuro);
            font-family: 'Caveat', cursive;
            font-size: 15px;
            min-height: 22px;
        }

        #valor {
            color: var(--giz);
            font-family: 'Special Elite', cursive;
            font-size: 42px;
            word-break: break-all;
            line-height: 1.1;
            transition: font-size 0.1s;
        }

        .botoes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        button {
            height: 62px;
            border: none;
            border-radius: 8px;
            font-family: 'Special Elite', cursive;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.1s;
        }

        button:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        .limpar {
            background-color: var(--quadro-op);
            color: var(black);
        }

        .apagar {
            background-color: var(--quadro-op);
            color: var(black);
        }

        .operacao {
            background-color: var(--quadro-op);
            color: var(black);
        }

        .numero {
            background-color: var(--quadro-light);
            color: white;
        }

        .numero.zero {
            grid-column: span 2;
        }

        .igual {
            background-color: var(--vermelho);
            color: var(--ink);
            font-size: 24px;
        }

        .igual:hover {
            background: #ce4a39;
        }

        .numero:hover {
            background: #244739;
        }

        .operacao:hover {
            background: #14573b;
        }

        .limpar:hover {
            background: #14573b;
        }

        .apagar:hover {
            background: #14573b;
        }

        .quadro {
            position: relative;
            width: 1000px;
            padding: 16px;
            border-radius: 10px;

            background: linear-gradient(145deg,
                    #5a3e2b,
                    #3e2a1d);

            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.6),
                inset 0 2px 4px rgba(255, 255, 255, 0.15),
                inset 0 -4px 8px rgba(0, 0, 0, 0.4);
        }

        .separar {
            display: flex;
            gap: 35px;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        .quadro-dentro {
            position: relative;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(255, 255, 255, 0.02) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 30%, rgba(255, 255, 255, 0.015) 0%, transparent 50%);
            min-height: 90px;
            border-top: none;
            background: #1c2b22;
            border-radius: 6px;
            padding: 28px;

            box-shadow:
                inset 0 2px 6px rgba(0, 0, 0, 0.6),
                inset 0 -2px 4px rgba(255, 255, 255, 0.05);

        }

        .quadro-dentro::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(180deg,
                    transparent,
                    transparent 28px,
                    rgba(255, 255, 255, 0.025) 28px,
                    rgba(255, 255, 255, 0.025) 29px);
            pointer-events: none;
            border-radius: 3px;
        }

        h1 {
            font-family: 'Special Elite', cursive;
            color: var(--giz);
            font-size: 32px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
            margin: 0;
            letter-spacing: 0.08em;
            text-align: left;
        }



        h2 {
            font-family: 'Caveat', cursive;
            color: var(--giz-escuro);
            font-size: 18px;
            margin-top: 4px;
            text-align: left;
            letter-spacing: 0.05em
        }

        .risco {
            height: 3px;
            background: linear-gradient(90deg, var(--giz-escuro), transparent);
            border-radius: 2px;
            margin-top: 14px;
            opacity: 0.4;
        }

        p {
            font-family: 'Caveat', cursive;
            color: var(--giz);
            font-size: 25px;
            margin-bottom: 4px;
            padding-bottom: 6px;
        }

        .riscado {
            color: var(--giz);
            border-bottom: 2px dashed rgba(255, 255, 255, 0.2);
            font-size: 22px;
            padding-bottom: 6px;
            margin-bottom: 4px;
        }

        .aba {
            border-collapse: separate;
            border-spacing: 10px;
            display: flex;
            gap: 6px;
            padding: 1px;
            flex-wrap: wrap;
            margin-bottom: 20px;

        }

        .aba td {
            background-color: var(--quadro);
            border: 2px solid var(--madeira);
            color: var(--giz);
            padding: 10px 16px;
            border-radius: 6px;
            font-family: 'Special Elite', cursive;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.1s;

        }

        .quadro+.quadro {
            margin-top: 30px;
        }

        #historico {
            width: 350px;
            min-height: 60px;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
            padding-left: 20px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
        }

        #historico p {
            font-size: 22px;
            color: var(--giz-escuro)
        }

        .separar2 {
            margin-left: 30px;
        }

        #historico::-webkit-scrollbar {
            width: 8px;
        }

        #historico::-webkit-scrollbar-track {
            background: transparent;
        }

        #historico::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        #historico::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .riscado+#historico {
            margin-top: 20px;
        }
        
    </style>
</head>

<body>

    <div class="quadro">
        <div class="quadro-dentro">
            <h1>📐 MATHeus </h1>
            <h2> Calculadora Avançada.</h2>
            <div class="risco"></div>
        </div>
    </div>


    <div class="quadro">
        <div class="quadro-dentro">
            <table class="aba">
                <tr>
                    <td id="inicial"> 🔢 Básica </td>
                    <td id="avancada"> 📊 Avançada</td>
                    <td id="log"> 🧮 Logaritmo</td>
                    <td id = "equacao"> ✏️ Equações E Texto</td>
                    <td id = "IA"> 🤖 MATHeus' IA </td>
                </tr>
            </table>
            <div class="separar">
                <div class="calculadora">
                    <div class="display">
                        <span id="expressao"></span>
                        <span id="valor">0</span>
                    </div>

                    <div class="botoes">
                        <button class="limpar" onclick="limpar()">AC</button>
                        <button class="apagar" onclick="apagar()">⌫</button>
                        <button class="operacao" onclick="escolherOperacao('%')">%</button>
                        <button class="operacao" onclick="escolherOperacao('÷')">÷</button>

                        <button class="numero" onclick="insert('7')">7</button>
                        <button class="numero" onclick="insert('8')">8</button>
                        <button class="numero" onclick="insert('9')">9</button>

                        <button class="operacao" onclick="escolherOperacao('×')">×</button>

                        <button class="numero" onclick="insert('4')">4</button>
                        <button class="numero" onclick="insert('5')">5</button>
                        <button class="numero" onclick="insert('6')">6</button>
                        <button class="operacao" onclick="escolherOperacao('-')">-</button>

                        <button class="numero" onclick="insert('1')">1</button>
                        <button class="numero" onclick="insert('2')">2</button>
                        <button class="numero" onclick="insert('3')">3</button>
                        <button class="operacao" onclick="escolherOperacao('+')">+</button>
                        <button class="numero zero" onclick="insert('0')">0</button>
                        <button class="igual" onclick="insert('.')">.</button>
                        <button class="igual" onclick="calcular()">=</button>
                    </div>
                </div>
                <div class="separar2">
                    <p> Histórico de Cálculos: </p>
                    <div class="riscado"></div>
                    <div id="historico"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/calculo.js"></script>
</body>

</html>
